name: Build extension

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-chrome:
    name: Build Chrome extension
    runs-on: ubuntu-latest

    env:
      AUTOMA_PASS_KEY: ${{ secrets.AUTOMA_PASS_KEY || 'automa-github-actions-pass-key' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create local pass key module
        run: |
          node -e 'const fs = require("fs"); const key = process.env.AUTOMA_PASS_KEY || "automa-github-actions-pass-key"; fs.writeFileSync("src/utils/getPassKey.js", "export default function getPassKey() {\n  return " + JSON.stringify(key) + ";\n}\n");'

      - name: Build Chrome extension
        run: pnpm build

      - name: Verify build output
        run: test -f build/manifest.json

      - name: Upload Chrome build artifact
        uses: actions/upload-artifact@v4
        with:
          name: automa-chrome-build
          path: build/
          if-no-files-found: error
