name: Build extension

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-chrome:
    name: Build Chrome extension
    runs-on: ubuntu-latest

    env:
      AUTOMA_PASS_KEY: ${{ secrets.AUTOMA_PASS_KEY || 'automa-github-actions-pass-key' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create local pass key module
        run: |
          node -e 'const fs = require("fs"); const key = process.env.AUTOMA_PASS_KEY || "automa-github-actions-pass-key"; fs.writeFileSync("src/utils/getPassKey.js", "export default function getPassKey() {\n  return " + JSON.stringify(key) + ";\n}\n");'

      - name: Build Chrome extension
        run: pnpm build

      - name: Verify build output
        run: test -f build/manifest.json

      - name: Package Chrome extension
        run: |
          pnpm build:zip
          cp build-zip/*/*.zip automa-chrome-build.zip

      - name: Upload Chrome build artifact
        uses: actions/upload-artifact@v4
        with:
          name: automa-chrome-build
          path: automa-chrome-build.zip
          if-no-files-found: error

      - name: Create GitHub release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./build/manifest.json').version")
          TAG="automa-v${VERSION}-build.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          gh release create "$TAG" automa-chrome-build.zip \
            --target "$GITHUB_SHA" \
            --title "Automa ${VERSION} build ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" \
            --notes "Automated Chrome extension build for commit ${GITHUB_SHA}."
